name: 📦Auto Build for N
run-name: 📦 ${{ github.actor }} @ Github Action

on:
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [ api82, api100, api101 ]
    steps:
      - name: ⏰ Set Timezone to Asia/Shanghai
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          echo "Current time: $(date)"

      - name: 👨🏻💻 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: ☕ Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"
          cache: gradle

      - name: 🤝 Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-version: wrapper

      - name: ☎️ Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🔥 Build ${{ matrix.flavor }} Release
        run: ./gradlew assemble${{ matrix.flavor }}Release -Pversion=${{ github.ref_name }}

      - name: 📊 Locate APKs and Set Outputs
        id: locate_apks
        run: |
          flavor_dir="app/build/outputs/apk/${{ matrix.flavor }}/release"
          arm64_apk=$(find "$flavor_dir" -name "*-arm64-v8a-*.apk" | head -n 1)
          armv7_apk=$(find "$flavor_dir" -name "*-armeabi-v7a-*.apk" | head -n 1)
          x86_apk=$(find "$flavor_dir" -name "*-x86-*.apk" | head -n 1)
          x86_64_apk=$(find "$flavor_dir" -name "*-x86_64-*.apk" | head -n 1)
          universal_apk=$(find "$flavor_dir" -name "*-universal-*.apk" | head -n 1)
          echo "arm64_apk=$arm64_apk" >> $GITHUB_OUTPUT
          echo "armv7_apk=$armv7_apk" >> $GITHUB_OUTPUT
          echo "x86_apk=$x86_apk" >> $GITHUB_OUTPUT
          echo "x86_64_apk=$x86_64_apk" >> $GITHUB_OUTPUT
          echo "universal_apk=$universal_apk" >> $GITHUB_OUTPUT

      - name: ⏳ Copy APKs to staging for signing
        run: |
          mkdir -p app/build/outputs/apk/all-${{ matrix.flavor }}
          cp "${{ steps.locate_apks.outputs.arm64_apk }}" app/build/outputs/apk/all-${{ matrix.flavor }}/
          cp "${{ steps.locate_apks.outputs.armv7_apk }}" app/build/outputs/apk/all-${{ matrix.flavor }}/
          cp "${{ steps.locate_apks.outputs.x86_apk }}" app/build/outputs/apk/all-${{ matrix.flavor }}/
          cp "${{ steps.locate_apks.outputs.x86_64_apk }}" app/build/outputs/apk/all-${{ matrix.flavor }}/
          cp "${{ steps.locate_apks.outputs.universal_apk }}" app/build/outputs/apk/all-${{ matrix.flavor }}/

      - name: 🔐 Sign APKs
        id: sign_apks
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/all-${{ matrix.flavor }}
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: 36.0.0

      - name: 📦 Extract Signed APK Paths
        id: extract_apks
        run: |
          IFS=':' read -r -a files <<< "${{ steps.sign_apks.outputs.signedFiles }}"
          for file in "${files[@]}"; do
            if [[ "$file" == *arm64-v8a* ]]; then
              echo "signed_arm64=$file" >> $GITHUB_OUTPUT
            elif [[ "$file" == *armeabi-v7a* ]]; then
              echo "signed_armv7=$file" >> $GITHUB_OUTPUT
            elif [[ "$file" == *x86_64* ]]; then
              echo "signed_x86_64=$file" >> $GITHUB_OUTPUT
            elif [[ "$file" == *x86* ]]; then
              echo "signed_x86=$file" >> $GITHUB_OUTPUT
            elif [[ "$file" == *universal* ]]; then
              echo "signed_universal=$file" >> $GITHUB_OUTPUT
            fi
          done

      - name: 🚀 Upload APK - arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}-arm64-v8a
          path: ${{ steps.extract_apks.outputs.signed_arm64 }}

      - name: 🚀 Upload APK - armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}-armeabi-v7a
          path: ${{ steps.extract_apks.outputs.signed_armv7 }}

      - name: 🚀 Upload APK - x86
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}-x86
          path: ${{ steps.extract_apks.outputs.signed_x86 }}

      - name: 🚀 Upload APK - x86_64
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}-x86_64
          path: ${{ steps.extract_apks.outputs.signed_x86_64 }}

      - name: 🚀 Upload APK - universal
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}-universal
          path: ${{ steps.extract_apks.outputs.signed_universal }}

      - name: 🛠️ Extract file names and version
        id: extract_info
        run: |
          version="${{ github.ref_name }}"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: 🎨 Generate APKS Checksum
        run: |
          sha256sum ${{ steps.extract_apks.outputs.signed_arm64 }} > CHECKSUMS-Sesame-${{ matrix.flavor }}-arm64-v8a-${{ steps.extract_info.outputs.version }}.apk.sha256
          sha256sum ${{ steps.extract_apks.outputs.signed_armv7 }} > CHECKSUMS-Sesame-${{ matrix.flavor }}-armeabi-v7a-${{ steps.extract_info.outputs.version }}.apk.sha256
          sha256sum ${{ steps.extract_apks.outputs.signed_x86 }} > CHECKSUMS-Sesame-${{ matrix.flavor }}-x86-${{ steps.extract_info.outputs.version }}.apk.sha256
          sha256sum ${{ steps.extract_apks.outputs.signed_x86_64 }} > CHECKSUMS-Sesame-${{ matrix.flavor }}-x86_64-${{ steps.extract_info.outputs.version }}.apk.sha256
          sha256sum ${{ steps.extract_apks.outputs.signed_universal }} > CHECKSUMS-Sesame-${{ matrix.flavor }}-universal-${{ steps.extract_info.outputs.version }}.apk.sha256

      - name: 🚀 Upload Assets to Source Release
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.release.tag_name || steps.extract_info.outputs.version }}
          files: |
            ${{ steps.extract_apks.outputs.signed_arm64 }}
            ${{ steps.extract_apks.outputs.signed_armv7 }}
            ${{ steps.extract_apks.outputs.signed_x86 }}
            ${{ steps.extract_apks.outputs.signed_x86_64 }}
            ${{ steps.extract_apks.outputs.signed_universal }}
            CHECKSUMS-Sesame-${{ matrix.flavor }}-arm64-v8a-${{ steps.extract_info.outputs.version }}.apk.sha256
            CHECKSUMS-Sesame-${{ matrix.flavor }}-armeabi-v7a-${{ steps.extract_info.outputs.version }}.apk.sha256
            CHECKSUMS-Sesame-${{ matrix.flavor }}-x86-${{ steps.extract_info.outputs.version }}.apk.sha256
            CHECKSUMS-Sesame-${{ matrix.flavor }}-x86_64-${{ steps.extract_info.outputs.version }}.apk.sha256
            CHECKSUMS-Sesame-${{ matrix.flavor }}-universal-${{ steps.extract_info.outputs.version }}.apk.sha256
          tag_name: ${{ steps.extract_info.outputs.version }}
          draft: false
          append_body: true
          make_latest: true
          generate_release_notes: false
          body: |

            > [!Important]
            >
            > ## 模块的蓬勃生机离不开社区与群组,感谢各位的贡献🎉

            > [!NOTE]
            > 你可以尝试点击下方图标加入我们的组织

            [![Telegram-Channel](https://img.shields.io/badge/Sesame--TK-nul?&logo=Telegram&label=Telegram-Channel&labelColor=fff&link=https%3A%2F%2Ft.me%2FSesame_TK_Channel)](https://t.me/Sesame_TK_Channel)   [![Telegram-Group](https://img.shields.io/badge/Sesame--TK-nul?&logo=Telegram&label=Telegram-Group&labelColor=fff&link=https%3A%2F%2Ft.me%2Ffansirsqi_xposed_sesame)](https://t.me/fansirsqi_xposed_sesame)   [![Static Badge](https://img.shields.io/badge/QQ--Channel-nul?style=flat&logo=qq&labelColor=%23fff&logoSize=12&label=%E8%85%BE%E8%AE%AF%E9%A2%91%E9%81%93&link=https%3A%2F%2Fpd.qq.com%2Fs%2Fhdvws4vuf)](https://pd.qq.com/s/hdvws4vuf)   [![Static Badge](https://img.shields.io/badge/QQ--Group-nul?style=flat&logo=qq&logoSize=12&label=QQ%E7%BE%A4%E8%81%8A&labelColor=%23fff&link=https%3A%2F%2Fqm.qq.com%2Fq%2FAj0Xby6AGQ)](https://qm.qq.com/q/Aj0Xby6AGQ)

            > ## 下载说明
            <b>- api82:</b> 传统 Xposed / EdXposed (LSPosed < 1.9)
            <b>- api100:</b> LSPosed API 100
            <b>- api101:</b> LSPosed API 101 (最新)
            >
            <b>- arm64-v8a:</b> 适用于64位ARM设备 (主流新手机)
            <b>- armeabi-v7a:</b> 适用于32位ARM设备 (旧款手机)
            <b>- x86 / x86_64:</b> 主要用于PC上的安卓模拟器
            <b>- universal:</b> 通用版 (不确定时使用，体积较大)
            >
            > **如果不确定架构，请下载 `universal` 版本。请根据你的框架选择对应的 API 版本。**

      - name: 🔁 Sync Release to Target Repository
        uses: softprops/action-gh-release@v2
        with:
          repository: Xposed-Modules-Repo/fansirsqi.xposed.sesame
          name: ${{ github.event.release.tag_name || steps.extract_info.outputs.version }}
          files: |
            ${{ steps.extract_apks.outputs.signed_arm64 }}
            ${{ steps.extract_apks.outputs.signed_armv7 }}
            ${{ steps.extract_apks.outputs.signed_x86 }}
            ${{ steps.extract_apks.outputs.signed_x86_64 }}
            ${{ steps.extract_apks.outputs.signed_universal }}
            CHECKSUMS-Sesame-${{ matrix.flavor }}-arm64-v8a-${{ steps.extract_info.outputs.version }}.apk.sha256
            CHECKSUMS-Sesame-${{ matrix.flavor }}-armeabi-v7a-${{ steps.extract_info.outputs.version }}.apk.sha256
            CHECKSUMS-Sesame-${{ matrix.flavor }}-x86-${{ steps.extract_info.outputs.version }}.apk.sha256
            CHECKSUMS-Sesame-${{ matrix.flavor }}-x86_64-${{ steps.extract_info.outputs.version }}.apk.sha256
            CHECKSUMS-Sesame-${{ matrix.flavor }}-universal-${{ steps.extract_info.outputs.version }}.apk.sha256
          token: ${{ secrets.TARGET_REPO_PAT }}
          tag_name: ${{ steps.extract_info.outputs.version }}
          draft: false
          make_latest: true
          body: |
            📦 内容同步自源仓库 [Sesame-TK](https://github.com/${{ github.repository }})

            ${{ github.event.release.body }}

            > ## 下载说明
            <b>- api82:</b> 传统 Xposed / EdXposed
            <b>- api100:</b> LSPosed API 100
            <b>- api101:</b> LSPosed API 101 (最新)
            >
            <b>- arm64-v8a:</b> 适用于64位ARM设备 (主流新手机)
            <b>- armeabi-v7a:</b> 适用于32位ARM设备 (旧款手机)
            <b>- x86 / x86_64:</b> 主要用于PC上的安卓模拟器
            <b>- universal:</b> 通用版 (不确定时使用，体积较大)
            >
            > **如果不确定架构，请下载 `universal` 版本。请根据你的框架选择对应的 API 版本。**
