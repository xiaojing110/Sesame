name: 🐞 Build Debug APK
run-name: 🐞 Debug Build - ${{ github.actor }}

on:
  push:
    branches: [ "n" ]
  pull_request:
    branches: [ "n" ]
  workflow_dispatch:

jobs:
  debug-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [ api82, api100, api101 ]
    steps:
      - name: ⏰ Set Timezone to Asia/Shanghai
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          echo "Current time: $(date)"

      - name: 👨🏻💻 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: ☕ Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"
          cache: gradle

      - name: 🤝 Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-version: wrapper

      - name: ☎️ Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🔥 Build ${{ matrix.flavor }} Debug APK
        run: ./gradlew assemble${{ matrix.flavor }}Debug -Pversion=${{ github.ref_name }}

      - name: 📊 Locate Debug APKs
        id: locate_apks
        run: |
          flavor_dir="app/build/outputs/apk/${{ matrix.flavor }}/debug"

          arm64_apk=$(find "$flavor_dir" -name "*-arm64-v8a-*.apk" | head -n 1)
          armv7_apk=$(find "$flavor_dir" -name "*-armeabi-v7a-*.apk" | head -n 1)
          x86_apk=$(find "$flavor_dir" -name "*-x86-*.apk" | head -n 1)
          x86_64_apk=$(find "$flavor_dir" -name "*-x86_64-*.apk" | head -n 1)
          universal_apk=$(find "$flavor_dir" -name "*-universal-*.apk" | head -n 1)
          if [ -z "$universal_apk" ]; then
             universal_apk=$(find "$flavor_dir" -name "*debug.apk" | head -n 1)
          fi

          echo "arm64_apk=$arm64_apk" >> $GITHUB_OUTPUT
          echo "armv7_apk=$armv7_apk" >> $GITHUB_OUTPUT
          echo "x86_apk=$x86_apk" >> $GITHUB_OUTPUT
          echo "x86_64_apk=$x86_64_apk" >> $GITHUB_OUTPUT
          echo "universal_apk=$universal_apk" >> $GITHUB_OUTPUT

      - name: 🚀 Upload Debug APK - arm64-v8a
        if: steps.locate_apks.outputs.arm64_apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.flavor }}-arm64-v8a
          path: ${{ steps.locate_apks.outputs.arm64_apk }}

      - name: 🚀 Upload Debug APK - armeabi-v7a
        if: steps.locate_apks.outputs.armv7_apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.flavor }}-armeabi-v7a
          path: ${{ steps.locate_apks.outputs.armv7_apk }}

      - name: 🚀 Upload Debug APK - x86
        if: steps.locate_apks.outputs.x86_apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.flavor }}-x86
          path: ${{ steps.locate_apks.outputs.x86_apk }}

      - name: 🚀 Upload Debug APK - x86_64
        if: steps.locate_apks.outputs.x86_64_apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.flavor }}-x86_64
          path: ${{ steps.locate_apks.outputs.x86_64_apk }}

      - name: 🚀 Upload Debug APK - Universal
        if: steps.locate_apks.outputs.universal_apk != ''
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.flavor }}-universal
          path: ${{ steps.locate_apks.outputs.universal_apk }}
